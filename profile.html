<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Profile — Retire Abroad</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d0f12;color:#f0f2f5;min-height:100vh;padding:20px}
.shell{max-width:600px;margin:0 auto;padding:40px 20px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:36px}
.back{color:#4f8ef7;font-size:13px;text-decoration:none;display:flex;align-items:center;gap:6px}
h1{font-size:22px;font-weight:700}
.card{background:#13161b;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:24px;margin-bottom:14px}
.card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#4f8ef7;margin-bottom:18px}
/* Avatar section */
.avatar-row{display:flex;align-items:center;gap:20px;margin-bottom:20px}
.avatar-big{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#4f8ef7,#2dd4bf);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden}
.avatar-big img{width:100%;height:100%;object-fit:cover}
.avatar-actions{display:flex;flex-direction:column;gap:8px}
.btn-small{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.btn-outline{background:transparent;border:1px solid rgba(255,255,255,.15);color:#8b919e}
.btn-outline:hover{border-color:#4f8ef7;color:#4f8ef7}
/* Fields */
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;color:#8b919e;margin-bottom:6px;font-weight:500}
.field input,.field select{width:100%;background:#1a1e26;color:#f0f2f5;border:1px solid rgba(255,255,255,.1);padding:11px 14px;border-radius:10px;font-size:14px;outline:none;font-family:inherit;transition:border .15s}
.field input:focus{border-color:#4f8ef7}
.field .hint{font-size:11px;color:#555d6b;margin-top:4px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
/* Buttons */
.btn-primary{padding:12px 28px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:inherit;background:#4f8ef7;color:#fff;transition:all .15s}
.btn-primary:hover{background:#3a7ce0}
.btn-danger{padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid rgba(248,113,113,.3);font-family:inherit;background:rgba(248,113,113,.08);color:#f87171;transition:all .15s}
.btn-danger:hover{background:rgba(248,113,113,.15)}
.msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;display:none}
.msg.ok{background:rgba(34,200,122,.1);border:1px solid rgba(34,200,122,.2);color:#22c87a;display:block}
.msg.err{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2);color:#f87171;display:block}
.sign-out-btn{padding:8px 16px;background:rgba(248,113,113,.1);color:#f87171;border:1px solid rgba(248,113,113,.2);border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit}
@media(max-width:500px){.row2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="shell">
  <div class="header">
    <a href="/app.html" class="back">&#8592; Back to tracker</a>
    <button class="sign-out-btn" onclick="signOut()">Sign out</button>
  </div>

  <h1 style="margin-bottom:24px">Your Profile</h1>

  <div class="msg" id="msg"></div>

  <!-- Identity -->
  <div class="card">
    <div class="card-title">Identity</div>
    <div class="avatar-row">
      <div class="avatar-big" id="avatarEl">J</div>
      <div class="avatar-actions">
        <div style="font-size:13px;color:#f0f2f5;font-weight:600" id="displayEmail">Loading...</div>
        <div style="font-size:11px;color:#555d6b;margin-top:2px">Signed in with Google</div>
      </div>
    </div>
    <div class="field">
      <label>Display name</label>
      <input type="text" id="profileName" placeholder="Your first name">
      <div class="hint">This is how you appear in the tracker header</div>
    </div>
    <button class="btn-primary" onclick="saveName()">Save name</button>
  </div>

  <!-- Financial basics -->
  <div class="card">
    <div class="card-title">Financial Basics</div>
    <div class="row2">
      <div class="field">
        <label>Current salary ($)</label>
        <input type="number" id="pSalary" placeholder="e.g. 120,000" step="5000">
      </div>
      <div class="field">
        <label>Cash savings ($)</label>
        <input type="number" id="pCash" placeholder="e.g. 50,000" step="1000">
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label>401k balance ($)</label>
        <input type="number" id="p401k" placeholder="e.g. 200,000" step="5000">
      </div>
      <div class="field">
        <label>SS benefit at 67 ($)</label>
        <input type="number" id="pSS" placeholder="e.g. 2,500" step="50">
        <div class="hint"><a href="https://www.ssa.gov/myaccount" target="_blank" style="color:#4f8ef7">Check at ssa.gov/myaccount</a></div>
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label>Target retirement age</label>
        <input type="number" id="pRetireAge" placeholder="e.g. 55" min="45" max="70">
      </div>
      <div class="field">
        <label>Retirement destination</label>
        <select id="pLocation">
          <option value="Spain">🇪🇸 Spain</option>
          <option value="Portugal">🇵🇹 Portugal</option>
          <option value="Italy">🇮🇹 Italy</option>
          <option value="Mexico">🇲🇽 Mexico</option>
          <option value="Thailand">🇹🇭 Thailand</option>
          <option value="Greece">🇬🇷 Greece</option>
          <option value="Colombia">🇨🇴 Colombia</option>
          <option value="USA">🇺🇸 Stay in USA</option>
        </select>
      </div>
    </div>
    <button class="btn-primary" onclick="saveFinancials()">Save financials</button>
  </div>

  <!-- Danger zone -->
  <div class="card">
    <div class="card-title" style="color:#f87171">Account</div>
    <p style="font-size:13px;color:#8b919e;margin-bottom:14px;line-height:1.6">Reset your intake to start fresh, or sign out of your account.</p>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn-danger" onclick="resetIntake()">Reset & redo intake</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL='https://wsasqxocibzxfzkaiucr.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndzYXNxeG9jaWJ6eGZ6a2FpdWNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3MTAzNzMsImV4cCI6MjA5NjI4NjM3M30.UYKM5KbV4oBXyQh0FDEduDPvO5tzLHS2DAh_ZKV_PcA';
const {createClient}=supabase;
const sb=createClient(SUPABASE_URL,SUPABASE_KEY,{auth:{flowType:'implicit',detectSessionInUrl:true,persistSession:true,autoRefreshToken:true}});
let currentUser=null;

function showMsg(text,type='ok'){const el=document.getElementById('msg');el.textContent=text;el.className='msg '+type;setTimeout(()=>el.className='msg',3000);}

async function init(){
  const {data:{session}}=await sb.auth.getSession();
  if(!session?.user){window.location.href='/index.html';return;}
  currentUser=session.user;
  // Set email display
  document.getElementById('displayEmail').textContent=currentUser.email;
  // Set avatar
  const av=document.getElementById('avatarEl');
  if(currentUser.user_metadata?.avatar_url){
    av.innerHTML=`<img src="${currentUser.user_metadata.avatar_url}" alt="">`;
  }
  // Load profile
  const {data:profile}=await sb.from('user_profiles').select('*').eq('id',currentUser.id).single();
  if(profile?.full_name)document.getElementById('profileName').value=profile.full_name;
  // Load settings
  const {data:s}=await sb.from('user_settings').select('*').eq('user_id',currentUser.id).single();
  if(s){
    if(s.current_salary)document.getElementById('pSalary').value=s.current_salary;
    if(s.cash_balance)document.getElementById('pCash').value=s.cash_balance;
    if(s.k401_balance)document.getElementById('p401k').value=s.k401_balance;
    if(s.ss_base_67)document.getElementById('pSS').value=s.ss_base_67;
    if(s.retire_age)document.getElementById('pRetireAge').value=s.retire_age;
    if(s.retirement_location)document.getElementById('pLocation').value=s.retirement_location;
  }
}

async function saveName(){
  const name=document.getElementById('profileName').value.trim();
  if(!name)return showMsg('Please enter a name','err');
  const {error}=await sb.from('user_profiles').update({full_name:name,updated_at:new Date().toISOString()}).eq('id',currentUser.id);
  if(error)showMsg('Error: '+error.message,'err');
  else showMsg('Name updated — changes will appear next time you load the tracker');
}

async function saveFinancials(){
  const updates={
    current_salary:+document.getElementById('pSalary').value||null,
    cash_balance:+document.getElementById('pCash').value||null,
    k401_balance:+document.getElementById('p401k').value||null,
    ss_base_67:+document.getElementById('pSS').value||null,
    retire_age:+document.getElementById('pRetireAge').value||null,
    retirement_location:document.getElementById('pLocation').value,
    updated_at:new Date().toISOString()
  };
  const {error}=await sb.from('user_settings').upsert({user_id:currentUser.id,...updates},{onConflict:'user_id'});
  if(error)showMsg('Error: '+error.message,'err');
  else showMsg('Financial details saved \u2014 your tracker will reflect these next time you open it');
}

async function resetIntake(){
  if(!confirm('This will clear your setup and take you through the intake wizard again. Your financial history is preserved. Continue?'))return;
  await sb.from('user_profiles').update({intake_completed:false}).eq('id',currentUser.id);
  window.location.href='/intake.html';
}

async function signOut(){await sb.auth.signOut();window.location.href='/index.html';}
init();
</script>
</body>
</html>
